<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <rect width="400" height="260" fill="#f8f8f8"/>

  <!-- Edges -->
  <g stroke="#ccc" stroke-width="1.5" fill="none">
    <!-- Article A -->
    <line x1="82"  y1="135" x2="140" y2="62"/>
    <line x1="82"  y1="135" x2="200" y2="92"/>
    <line x1="82"  y1="135" x2="200" y2="178"/>
    <line x1="82"  y1="135" x2="95"  y2="212"/>
    <!-- Article B -->
    <line x1="318" y1="135" x2="278" y2="58"/>
    <line x1="318" y1="135" x2="200" y2="92"/>
    <line x1="318" y1="135" x2="200" y2="178"/>
    <line x1="318" y1="135" x2="292" y2="215"/>
    <!-- Entity–entity -->
    <line x1="200" y1="92"  x2="140" y2="62"/>
    <line x1="200" y1="92"  x2="278" y2="58"/>
    <!-- Domain to fact-check -->
    <line x1="292" y1="215" x2="352" y2="168"/>
  </g>

  <!-- Article A — FAKE -->
  <circle cx="82"  cy="135" r="30" fill="#fff" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="82"  y="130" font-family="Inter,Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Art.</text>
  <text x="82"  y="145" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="600" fill="#c0392b" text-anchor="middle">FAKE</text>

  <!-- Article B — REAL -->
  <circle cx="318" cy="135" r="30" fill="#fff" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="318" y="130" font-family="Inter,Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Art.</text>
  <text x="318" y="145" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="600" fill="#217a3c" text-anchor="middle">REAL</text>

  <!-- ORG — shared hub (top center) -->
  <circle cx="200" cy="92"  r="14" fill="#0066cc"/>

  <!-- DATE — shared entity (bottom center) -->
  <circle cx="200" cy="178" r="10" fill="#0066cc" opacity="0.7"/>

  <!-- PERSON entity -->
  <circle cx="140" cy="62"  r="10" fill="#0066cc" opacity="0.75"/>

  <!-- GPE entity -->
  <circle cx="278" cy="58"  r="10" fill="#0066cc" opacity="0.75"/>

  <!-- Source domain A -->
  <circle cx="95"  cy="212" r="14" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Source domain B -->
  <circle cx="292" cy="215" r="14" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Fact-check -->
  <circle cx="352" cy="168" r="10" fill="none" stroke="#b07000" stroke-width="1.5"/>
</svg>
